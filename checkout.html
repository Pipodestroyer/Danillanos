    <div class="checkout-container">
        <div class="checkout-steps">
            <div class="step active" id="indicator-1">1. Envío</div>
            <div class="step" id="indicator-2">2. Pago</div>
            <div class="step" id="indicator-3">3. Confirmación</div>
        </div>

        <div class="checkout-grid">
            <div class="checkout-forms">
                
                <form id="step-1" class="checkout-form step-content active" onsubmit="event.preventDefault(); nextStep(2);">
                    <h2>Datos de Envío</h2>
                    <input type="text" placeholder="Nombre completo del negocio/persona" required>
                    <input type="text" placeholder="Dirección exacta de entrega" required>
                    <input type="text" placeholder="Ciudad / Municipio" required>
                    <input type="tel" placeholder="Número de contacto" required>
                    
                    <button type="submit" class="contact-button" style="background-color: var(--main); width: 100%; margin-top: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; border: none; padding: 15px; color: white;">
                        Continuar al Pago
                    </button>
                </form>

                <form id="step-2" class="checkout-form step-content" onsubmit="event.preventDefault(); processCheckout();">
                    <h2>Método de Pago</h2>
                    <div class="payment-methods">
                        <label class="pay-method"><input type="radio" name="pago" value="tarjeta" checked onchange="toggleCardDetails()"> Tarjeta (Crédito/Débito)</label>
                        <label class="pay-method"><input type="radio" name="pago" value="nequi" onchange="toggleCardDetails()"> Nequi / Daviplata</label>
                        <label class="pay-method"><input type="radio" name="pago" value="transferencia" onchange="toggleCardDetails()"> Transferencia Bancaria</label>
                    </div>
                    
                    <div class="card-details" id="card-inputs">
                        <input type="text" placeholder="Número de Tarjeta" required pattern="[0-9]{16}" title="16 números requeridos">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" placeholder="MM/AA" required pattern="[0-9]{2}/[0-9]{2}" title="Formato MM/AA">
                            <input type="text" placeholder="CVC" required pattern="[0-9]{3,4}">
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="button" onclick="nextStep(1)" style="flex: 1; background-color: transparent; border: 1px solid var(--contrast); color: var(--text); padding: 15px; border-radius: 10px; cursor: pointer;">
                            Atrás
                        </button>
                        <button type="submit" style="flex: 2; background-color: var(--main); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold;" id="btn-finalizar">
                            Finalizar Compra
                        </button>
                    </div>
                </form>

                <div id="step-3" class="step-content" style="text-align: center; padding: 50px 0;">
                    <svg style="animation: spin 2s linear infinite;" xmlns="http://www.w3.org/2000/svg" height="80px" viewBox="0 -960 960 960" width="80px" fill="var(--main)"><path d="M480-80q-82 0-155-31.5t-127.5-86Q143-252 111.5-325T80-480q0-83 31.5-155.5t86-127Q252-817 325-848.5T480-880q17 0 28.5 11.5T520-840q0 17-11.5 28.5T480-800q-133 0-226.5 93.5T160-480q0 133 93.5 226.5T480-160q133 0 226.5-93.5T800-480q0-17 11.5-28.5T840-520q17 0 28.5 11.5T880-480q0 82-31.5 155t-86 127.5q-54.5 54.5-127 86T480-80Z"/></svg>
                    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
                    <h2 style="margin-top: 30px;">Procesando...</h2>
                    <p id="process-text" style="color: var(--contrast); margin-top: 10px;">Conectando con el banco</p>
                </div>

            </div>

            <div class="order-summary">
                <h2>Resumen de Orden</h2>
                <div id="checkout-items" style="margin-top: 20px;">
                    </div>
                <hr style="border-color: var(--contrast); margin: 15px 0;">
                <h3>Total <span style="float:right; color: var(--main);" id="checkout-total">$0</span></h3>
            </div>
        </div>
    </div>

    <div class="overlaycarrito" id="overlaycarrito" style="display: none;"></div>
    <div class="shoppingcart" id="global-shopping-cart">
        <div class="maincart"></div>
        <div class="cartbuttons" style="gap: 8px;">
            <button class="controllers" id="closethecart">
               <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="m313-440 196 196q12 12 11.5 28T508-188q-12 11-28 11.5T452-188L188-452q-6-6-8.5-13t-2.5-15q0-8 2.5-15t8.5-13l264-264q11-11 27.5-11t28.5 11q12 12 12 28.5T508-715L313-520h447q17 0 28.5 11.5T800-480q0 17-11.5 28.5T760-440H313Z"/></svg>
            </button>
            <button class="mainbuy" style="flex: 1;">Checkout</button>
            <button class="controllers" id="deletethecart">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"><path d="M280-120q-33 0-56.5-23.5T200-200v-520q-17 0-28.5-11.5T160-760q0-17 11.5-28.5T200-800h160q0-17 11.5-28.5T400-840h160q17 0 28.5 11.5T600-800h160q17 0 28.5 11.5T800-760q0 17-11.5 28.5T760-720v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520Zm-400 0v520-520Zm200 316 76 76q11 11 28 11t28-11q11-11 11-28t-11-28l-76-76 76-76q11-11 11-28t-11-28q-11-11-28-11t-28 11l-76 76-76-76q-11-11-28-11t-28 11q-11 11-11 28t11 28l76 76-76 76q-11 11-11 28t11 28q11 11 28 11t28-11l76-76Z"/></svg>
            </button> 
        </div>
    </div>

    <script>
        window.renderCheckoutSummary = function() {
            let car = JSON.parse(localStorage.getItem('danillanos_carrito')) || [];
            const container = document.getElementById('checkout-items');
            const totalC = document.getElementById('checkout-total');
            
            if(car.length === 0){
                container.innerHTML = '<p style="color:var(--contrast);">No hay productos.</p>';
                totalC.innerText = '$0';
                document.getElementById('btn-finalizar').disabled = true;
                document.getElementById('btn-finalizar').style.opacity = '0.5';
                return;
            }
            
            let html = '';
            let total = 0;
            car.forEach(i => {
                let sTotal = i.precio * i.cantidad;
                total += sTotal;
                html += `<div class="summary-item">
                            <span>${i.cantidad}x ${i.nombre}</span>
                            <span>$${sTotal.toLocaleString('es-CO')}</span>
                         </div>`;
            });
            container.innerHTML = html;
            totalC.innerText = '$' + total.toLocaleString('es-CO');
        };

        function nextStep(step) {
            document.querySelectorAll('.step-content').forEach(e => e.classList.remove('active'));
            document.getElementById('step-' + step).classList.add('active');
            
            document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
            for(let i = 1; i <= step; i++){
                document.getElementById('indicator-' + i).classList.add('active');
            }
        }

        function toggleCardDetails() {
            const isCard = document.querySelector('input[name="pago"]:checked').value === 'tarjeta';
            const cardBlock = document.getElementById('card-inputs');
            const inputs = cardBlock.querySelectorAll('input');
            
            if(isCard) {
                cardBlock.style.display = 'block';
                inputs.forEach(i => i.setAttribute('required', 'true'));
            } else {
                cardBlock.style.display = 'none';
                inputs.forEach(i => i.removeAttribute('required'));
            }
        }

        function processCheckout() {
            nextStep(3);
            const texto = document.getElementById('process-text');
            
            setTimeout(() => { texto.innerText = "Autorizando cobro con pasarela de pago..."; }, 1500);
            setTimeout(() => { texto.innerText = "Generando factura electrónica..."; }, 3500);
            setTimeout(() => { 
                alert("¡Esto solo es un ejemplo visual, no se te ha hecho ningun cobro!");
                if(typeof clearCart === "function") clearCart(); 
                window.location.href = '/index.html'; 
            }, 5500);
        }
    </script>
